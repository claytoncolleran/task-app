services:
  - type: web
    name: task-app-api
    runtime: node
    rootDir: .
    plan: free
    buildCommand: npm install && npm run build:shared && npm --workspace api run build && npm --workspace api run db:migrate
    startCommand: npm --workspace api run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false

  - type: web
    name: task-app-web
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build:shared && npm --workspace web run build
    staticPublishPath: web/dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
